name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  QT_VERSION: '6.7.2'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt (MSVC)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtmultimedia'
          cache: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Generate icons
        run: python generate_icons.py

      - name: Configure CMake
        shell: cmd
        run: cmake -B build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%Qt6_DIR%"

      - name: Build
        shell: cmd
        run: cmake --build build

      - name: Deploy Qt dependencies
        shell: cmd
        run: |
          mkdir deploy
          copy build\QuickSnapAudio.exe deploy\
          "%Qt6_DIR%\bin\windeployqt.exe" deploy\QuickSnapAudio.exe --release --no-translations --no-opengl-sw --no-system-d3d-compiler

      - name: Copy icon for installer
        shell: cmd
        run: copy resources\icon.ico deploy\

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build Installer
        shell: pwsh
        run: |
          $nsis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (!(Test-Path $nsis)) { $nsis = "C:\Program Files\NSIS\makensis.exe" }
          & $nsis installer.nsi

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: QuickSnapAudio-Setup.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libpulse-dev libx11-dev libxtst-dev \
            libgl1-mesa-dev libglib2.0-dev \
            pkg-config python3

      - name: Install Qt (GCC)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: 'linux'
          target: 'desktop'
          arch: 'linux_gcc_64'
          modules: 'qtmultimedia'
          cache: true

      - name: Generate icons
        run: python3 generate_icons.py

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$Qt6_DIR"

      - name: Build
        run: cmake --build build --parallel "$(nproc)"

      - name: Create .deb package
        run: cd build && cpack -G DEB

      - name: Upload Linux .deb
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: build/*.deb

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-deb
          path: artifacts/

      - name: List artifacts
        run: ls -lR artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "QuickSnapAudio ${{ github.ref_name }}"
          body: |
            ## QuickSnapAudio ${{ github.ref_name }}

            ### Downloads
            - **Windows**: Download `QuickSnapAudio-Setup.exe` and run the installer
            - **Linux (Debian/Ubuntu)**: Download the `.deb` file and install with `sudo dpkg -i quicksnapaudio_*.deb`

            ### Features
            - Add audio input/output devices
            - Assign hotkey combinations to each device
            - Instantly switch audio devices with hotkeys
            - System tray for background operation
          files: |
            artifacts/*
          draft: false
          prerelease: false
