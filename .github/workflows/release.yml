name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Qt (MinGW)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'
          modules: 'qtmultimedia'
          tools: 'tools_mingw1310'

      - name: Find Qt and MinGW paths
        shell: pwsh
        run: |
          $qtRoot = "$env:RUNNER_WORKSPACE/Qt/6.8.0/mingw_64"
          $mingw = "$env:RUNNER_WORKSPACE/Qt/Tools/mingw1310_64"
          if (!(Test-Path $qtRoot)) {
            Write-Host "Searching for Qt install..."
            Get-ChildItem "$env:RUNNER_WORKSPACE/Qt" -Recurse -Filter "qmake.exe" -Depth 4 | Select-Object FullName
            Get-ChildItem "$env:RUNNER_WORKSPACE/Qt" -Directory -Depth 2 | Select-Object FullName
          }
          if (!(Test-Path $mingw)) {
            $mingw = (Get-ChildItem "$env:RUNNER_WORKSPACE/Qt/Tools" -Directory -Filter "mingw*" | Select-Object -First 1).FullName
          }
          echo "QT_ROOT=$qtRoot" >> $env:GITHUB_ENV
          echo "MINGW_ROOT=$mingw" >> $env:GITHUB_ENV
          echo "PATH=$mingw\bin;$qtRoot\bin;$env:PATH" >> $env:GITHUB_ENV
          Write-Host "Qt root: $qtRoot"
          Write-Host "MinGW root: $mingw"

      - name: Configure CMake
        shell: cmd
        run: >
          cmake -B build -G "MinGW Makefiles"
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH="%QT_ROOT%"
          -DCMAKE_C_COMPILER="%MINGW_ROOT%/bin/gcc.exe"
          -DCMAKE_CXX_COMPILER="%MINGW_ROOT%/bin/g++.exe"
          -DCMAKE_MAKE_PROGRAM="%MINGW_ROOT%/bin/mingw32-make.exe"

      - name: Build
        shell: cmd
        run: cmake --build build --parallel

      - name: Deploy Qt dependencies
        shell: cmd
        run: |
          mkdir deploy
          copy build\QuickSnapAudio.exe deploy\
          windeployqt deploy\QuickSnapAudio.exe --release --no-translations --no-opengl-sw --no-system-d3d-compiler
          copy resources\icon.ico deploy\

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build Installer
        shell: pwsh
        run: |
          $nsis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (!(Test-Path $nsis)) { $nsis = "C:\Program Files\NSIS\makensis.exe" }
          & $nsis installer.nsi

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: QuickSnapAudio-Setup.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libpulse-dev libx11-dev libxtst-dev \
            libgl1-mesa-dev libglib2.0-dev \
            pkg-config

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          host: 'linux'
          target: 'desktop'
          arch: 'linux_gcc_64'
          modules: 'qtmultimedia'

      - name: Find Qt path
        run: |
          QT_ROOT="$RUNNER_WORKSPACE/Qt/6.8.0/gcc_64"
          if [ ! -d "$QT_ROOT" ]; then
            echo "Searching for Qt..."
            find "$RUNNER_WORKSPACE/Qt" -name "qmake" -type f 2>/dev/null | head -5
            ls -la "$RUNNER_WORKSPACE/Qt/" || true
            ls -la "$RUNNER_WORKSPACE/Qt/6.8.0/" || true
          fi
          echo "QT_ROOT=$QT_ROOT" >> $GITHUB_ENV
          echo "Qt root: $QT_ROOT"

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_ROOT"

      - name: Build
        run: cmake --build build --parallel "$(nproc)"

      - name: Create .deb package
        run: cd build && cpack -G DEB

      - name: Upload Linux .deb
        uses: actions/upload-artifact@v7
        with:
          name: linux-deb
          path: build/*.deb

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-installer
          path: artifacts/

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-deb
          path: artifacts/

      - name: List artifacts
        run: ls -lR artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "QuickSnapAudio ${{ github.ref_name }}"
          body: |
            ## QuickSnapAudio ${{ github.ref_name }}

            ### Downloads
            - **Windows**: Download `QuickSnapAudio-Setup.exe` and run the installer
            - **Linux (Debian/Ubuntu)**: Download the `.deb` file and install with `sudo dpkg -i quicksnapaudio_*.deb`

            ### What's New in v1.0.4
            - **Appearance presets** — 7 built-in themes: Catppuccin Mocha, Light, Nord, Dracula, Solarized Dark, Tokyo Night, Gruvbox
            - Theme preference saved and restored across sessions
            - Notification popup now adapts to the selected theme
            - New project landing page at GitHub Pages
            - Updated README with banner logo

            ### Previous Features
            - Global hotkey audio device switching
            - System tray integration
            - Cross-platform (Windows & Linux)
            - Auto-update from GitHub releases
          files: |
            artifacts/*
          draft: false
          prerelease: false
